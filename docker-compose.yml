services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agnost_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-agnost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agnost}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agnost} -d ${POSTGRES_DB:-agnost_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
